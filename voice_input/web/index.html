<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语音输入</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260601-history-context" />
</head>
<body>
  <header>
    <div class="title">
      <h1>语音输入</h1>
      <span id="hotkey-hint">按 F2 开始/结束录音</span>
    </div>
  </header>

  <section class="live">
    <div class="controls">
      <label class="device-field" for="input-device">
        <span>输入设备</span>
        <select id="input-device">
          <option value="">系统默认输入</option>
        </select>
      </label>
      <button id="reload-devices-btn" type="button" title="刷新输入设备">刷新</button>
      <label class="context-field">
        <input id="history-context-toggle" type="checkbox" />
        <span>使用最近历史作为上下文</span>
      </label>
    </div>
    <div id="live-text" class="live-text" aria-live="polite">
      <div class="live-status">
        <span id="state-dot" class="dot idle" aria-hidden="true"></span>
        <span id="state-label">空闲</span>
      </div>
      <div id="live-message" class="live-message placeholder">…等待语音输入</div>
    </div>
    <button id="toggle-btn" type="button">开始录音</button>
  </section>

  <section class="history">
    <div class="history-header">
      <h2>历史记录</h2>
      <button id="refresh-btn" type="button" title="刷新">↻</button>
    </div>
    <ul id="history-list" class="history-list"></ul>
  </section>

  <script src="/static/app.js?v=20260601-history-context"></script>
</body>
</html>
